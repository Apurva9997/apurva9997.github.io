<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Example Page | apurva9997.github.io</title>
<meta name="description" content="A starter page for adding another GitHub Pages screen to this repo." />
<style>
  :root{
    --bg:#111318;
    --ink:#eef3f8;
    --muted:#a3adba;
    --line:#303743;
    --panel:#1a1f28;
    --accent:#63c7a4;
    --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5}
  main{max-width:760px;margin:0 auto;padding:48px 20px}
  nav{display:flex;gap:12px;margin-bottom:44px;font-family:var(--mono);font-size:12px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  h1{font-size:clamp(34px,8vw,64px);line-height:1;margin:0 0 18px;letter-spacing:0}
  p{color:var(--muted);font-size:18px;margin:0 0 22px;max-width:58ch}
  .panel{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:18px;margin-top:32px}
  .panel p{font-size:15px;margin:0}
  code{font-family:var(--mono);font-size:.92em;color:var(--ink)}
</style>
</head>
<body>
<main>
  <nav aria-label="Breadcrumb">
    <a href="/">Home</a>
    <a href="/pages/">All pages</a>
  </nav>

  <h1>Example Page</h1>
  <p>Duplicate this folder to add another standalone page to the same GitHub Pages site.</p>

  <section class="panel">
    <p>For example, copy <code>pages/example/</code> to <code>pages/my-new-page/</code>, then visit <code>/pages/my-new-page/</code>.</p>
  </section>
</main>
</body>
</html>
